version: "3.9"

services:
  # ── Backend: FastAPI inference server ───────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dermai-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TEMPERATURE_SCALING=${TEMPERATURE_SCALING:-1.3}
      - CONFIDENCE_HIGH=${CONFIDENCE_HIGH:-0.75}
      - CONFIDENCE_MEDIUM=${CONFIDENCE_MEDIUM:-0.45}
      - TOP_K_PREDICTIONS=${TOP_K_PREDICTIONS:-5}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-20}
      - MODEL_VERSION=${MODEL_VERSION:-unetpp-efficientnetb2-v1}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    volumes:
      # Persist logs across container restarts
      - ./backend/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Frontend: Vite dev server (development only) ─────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: dermai-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  logs:
